
services:
  postgres:
    image: postgres:16
    container_name: lm_postgres
    environment:
      POSTGRES_DB: linguamentor
      POSTGRES_USER: lm_user
      POSTGRES_PASSWORD: lm_dev_password # dev only — Vault in production
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data # persist data across restarts
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lm_user -d linguamentor"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    container_name: lm_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:

networks:
  default:
    name: linguamentor_network
