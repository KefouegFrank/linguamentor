# Docker Compose for Development
# Usage: docker compose -f docker-compose.dev.yml up

services:
  db:
    image: postgres:16-alpine
    container_name: linguamentor_db_dev
    restart: unless-stopped
    environment:
      POSTGRES_USER: linguamentor_user
      POSTGRES_PASSWORD: securepass
      POSTGRES_DB: linguamentor_db
    volumes:
      - db_data_dev:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U linguamentor_user -d linguamentor_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - linguamentor_dev

  backend:
    build:
      context: .
      target: development
    container_name: linguamentor_backend_dev
    volumes:
      - .:/app
      - /app/node_modules
      - /app/dist
    ports:
      - "4000:4000"
    env_file: .env
    environment:
      - NODE_ENV=development
      - DOCKER_ENV=true
      - DATABASE_HOST=db
    depends_on:
      db:
        condition: service_healthy
    networks:
      - linguamentor_dev
    command: pnpm dev

volumes:
  db_data_dev:

networks:
  linguamentor_dev:
    driver: bridge

