services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: linguamentor_user
      POSTGRES_PASSWORD: securepass
      POSTGRES_DB: linguamentor_db
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U linguamentor_user -d linguamentor_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      target: development  # Use development stage
    volumes:
      - .:/app
      - /app/node_modules  # Prevent overwriting node_modules
      - /app/dist  # Prevent overwriting dist folder
    ports:
      - "4000:4000"
    env_file: .env
    environment:
      - NODE_ENV=development
      - DOCKER_ENV=true
      - DATABASE_HOST=db
    depends_on:
      db:
        condition: service_healthy

volumes:
  db_data: