# Docker Compose for Production
# Usage: docker compose -f docker-compose.prod.yml up -d
# Note: Ensure .env.production is configured with production values

services:
  db:
    image: postgres:16-alpine
    container_name: linguamentor_db_prod
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-linguamentor_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME:-linguamentor_db}
    volumes:
      - db_data_prod:/var/lib/postgresql/data
    ports:
      - "${DB_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-linguamentor_user} -d ${DB_NAME:-linguamentor_db}"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - linguamentor_prod
    # Security: Remove port mapping in production if DB is only accessed internally
    # ports:
    #   - "5432:5432"

  redis:
    image: redis:7-alpine
    container_name: linguamentor_redis_prod
    restart: always
    volumes:
      - redis_data_prod:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - linguamentor_prod
    # Security: Redis should not be exposed externally in production
    # ports:
    #   - "6379:6379"

  backend:
    build:
      context: .
      target: production
    container_name: linguamentor_backend_prod
    restart: always
    ports:
      - "${PORT:-4000}:4000"
    env_file: .env.production
    environment:
      - NODE_ENV=production
      - DOCKER_ENV=true
      - DATABASE_HOST=db
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - linguamentor_prod
    # Health check
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:4000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  db_data_prod:
  redis_data_prod:

networks:
  linguamentor_prod:
    driver: bridge

